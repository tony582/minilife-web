<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/minilife_logo.png" />
    <link rel="apple-touch-icon" href="/minilife_logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF8C42" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MiniLife" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>MiniLife</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then((reg) => {
              // Check for updates every 60s
              setInterval(() => reg.update(), 60000);
              // Auto-reload when new SW activates
              reg.addEventListener('updatefound', () => {
                const newSW = reg.installing;
                if (newSW) {
                  newSW.addEventListener('statechange', () => {
                    if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                      window.location.reload();
                    }
                  });
                }
              });
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
