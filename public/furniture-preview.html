<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>家具预览（最终）</title>
<style>
  body { background: #f8f4ef; margin: 0; padding: 20px; font-family: sans-serif; }
  h2 { color: #444; font-size: 14px; margin: 16px 0 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 8px; }
  .card { background: white; border-radius: 12px; padding: 8px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .img-wrap { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
  .img-wrap img { max-width: 64px; max-height: 64px; object-fit: contain; image-rendering: pixelated; }
  .name { font-size: 10px; font-weight: 700; text-align: center; margin-top: 6px; color: #333; }
  .price { font-size: 9px; color: #f97316; font-weight: 800; margin-top: 2px; }
  .missing { border: 2px dashed #f87171; }
</style>
</head>
<body>

    { name: '挂画(漩涡)',    img: '/pets/furniture/painting_swirl.png',        price: 80  },
  ]},
];

sections.forEach(sec => {
  const h = document.createElement('h2');
  h.textContent = sec.cat;
  document.body.appendChild(h);
  const grid = document.createElement('div');
  grid.className = 'grid';
  sec.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="img-wrap">
        <img src="${item.img}" alt="${item.name}" onerror="this.parentNode.innerHTML='<span style=font-size:24px>❌</span>';this.parentNode.parentNode.classList.add('missing')" />
      </div>
      <div class="name">${item.name}</div>
      <div class="price">🪙${item.price}</div>
    `;
    grid.appendChild(card);
  });
  document.body.appendChild(grid);
});
</script>
</body>
</html>
